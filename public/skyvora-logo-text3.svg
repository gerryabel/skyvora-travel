<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main text: Skyvora -->
  <text x="120" y="115" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="900" font-size="88" fill="url(#tealGrad)" letter-spacing="3">Skyvora</text>

  <!-- Accent line -->
  <rect x="120" y="130" width="340" height="4" rx="2" fill="#f97316"/>

  <!-- Subtext: TRAVEL -->
  <text x="120" y="168" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="400" font-size="34" fill="#0ea5e9" letter-spacing="22">TRAVEL</text>

  <!-- Map pin -->
  <g transform="translate(510, 100)" opacity="0.6">
    <path d="M10,0 C4.5,0 0,4.5 0,10 C0,17 10,26 10,26 C10,26 20,17 20,10 C20,4.5 15.5,0 10,0 Z" fill="#f97316"/>
    <circle cx="10" cy="9" r="4" fill="white"/>
  </g>
</svg>
