<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
    <linearGradient id="wing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0f2fe"/>
    </linearGradient>
    <linearGradient id="wingShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bae6fd"/>
      <stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Globe lines (subtle) -->
  <g opacity="0.08" stroke="white" fill="none" stroke-width="1">
    <circle cx="50" cy="50" r="38"/>
    <ellipse cx="50" cy="50" rx="18" ry="38"/>
    <line x1="12" y1="50" x2="88" y2="50"/>
    <line x1="50" y1="12" x2="50" y2="88"/>
  </g>

  <!-- Paper airplane -->
  <g transform="translate(50, 48) rotate(-25)">
    <path d="M-26,8 L10,-4 L5,8 Z" fill="url(#wingShadow)"/>
    <path d="M-26,0 L10,-8 L5,0 Z" fill="url(#wing)"/>
    <line x1="-26" y1="0" x2="10" y2="-6" stroke="#bae6fd" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Trail -->
  <g opacity="0.3" fill="white">
    <circle cx="28" cy="62" r="2.5"/>
    <circle cx="23" cy="67" r="1.8"/>
    <circle cx="19" cy="71" r="1.2"/>
  </g>
</svg>
